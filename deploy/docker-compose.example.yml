services:
  app:
    build: ..
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "127.0.0.1:8765:8765"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8765/health/ready').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
